name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (plugin-sdk, plugin-builder, or both)"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - plugin-sdk
          - plugin-builder

jobs:
  publish-sdk:
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.package == 'plugin-sdk' || github.event.inputs.package == 'both'))

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/plugin-sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git tag "plugin-sdk-v${{ steps.version.outputs.version }}"
          git push origin "plugin-sdk-v${{ steps.version.outputs.version }}"

  publish-builder:
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.package == 'plugin-builder' || github.event.inputs.package == 'both'))

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/plugin-builder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git tag "plugin-builder-v${{ steps.version.outputs.version }}"
          git push origin "plugin-builder-v${{ steps.version.outputs.version }}"
